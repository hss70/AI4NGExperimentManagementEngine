  CreateQuestionnaireRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      RouteKey: POST /api/questionnaires
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-ParticipantAuthorizerId
