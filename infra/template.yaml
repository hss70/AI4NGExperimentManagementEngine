AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI4NG Question Engine using existing API Gateway

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # DynamoDB Tables
  AI4NGExperimentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai4ng-${Environment}-experiments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AI4NGResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai4ng-${Environment}-responses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AI4NGQuestionnairesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai4ng-${Environment}-questionnaires
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ExperimentsApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/ai4ng-${Environment}-experiments-api
      RetentionInDays: 14

  QuestionnairesApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/ai4ng-${Environment}-questionnaires-api
      RetentionInDays: 14

  ExperimentsApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ai4ng-${Environment}-experiments-api-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: !Sub ai4ng-${Environment}-experiments-api-inline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ExperimentsCrud
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt AI4NGExperimentsTable.Arn
                  - !Sub "${AI4NGExperimentsTable.Arn}/index/*"

              - Sid: ResponsesCrud
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt AI4NGResponsesTable.Arn
                  - !Sub "${AI4NGResponsesTable.Arn}/index/*"

              - Sid: QuestionnairesRead
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt AI4NGQuestionnairesTable.Arn
                  - !Sub "${AI4NGQuestionnairesTable.Arn}/index/*"

              - Sid: CognitoUserLookupReadOnly
                Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminGetUser
                Resource: !Sub
                  - arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}
                  - UserPoolId:
                      Fn::ImportValue:
                        Fn::Sub: AI4NG-${Environment}-ParticipantUserPoolId
      Tags:
        - Key: Project
          Value: AI4NG
        - Key: Environment
          Value: !Ref Environment

  QuestionnairesApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ai4ng-${Environment}-questionnaires-api-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: !Sub ai4ng-${Environment}-questionnaires-api-inline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: QuestionnairesCrud
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt AI4NGQuestionnairesTable.Arn
                  - !Sub "${AI4NGQuestionnairesTable.Arn}/index/*"
      Tags:
        - Key: Project
          Value: AI4NG
        - Key: Environment
          Value: !Ref Environment
  # Lambda Functions
  ExperimentsApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ai4ng-${Environment}-experiments-api
      Role: !GetAtt ExperimentsApiRole.Arn
      Handler: AI4NGExperimentsLambda::AI4NGExperimentsLambda.LambdaEntryPoint::FunctionHandlerAsync
      Runtime: dotnet8
      CodeUri: ../src/AI4NGExperimentsLambda
      Timeout: 30
      MemorySize: 512
      Tracing: Active
      LoggingConfig:
        LogFormat: JSON
        ApplicationLogLevel: INFO
        SystemLogLevel: INFO
        LogGroup: !Ref ExperimentsApiLogGroup
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: NetworkStack-PrivateSG
        SubnetIds: !Split
          - ","
          - Fn::ImportValue: NetworkStack-PrivateSubnetIds
      Environment:
        Variables:
          Environment: !Ref Environment
          EXPERIMENTS_TABLE: !Ref AI4NGExperimentsTable
          RESPONSES_TABLE: !Ref AI4NGResponsesTable
          QUESTIONNAIRES_TABLE: !Ref AI4NGQuestionnairesTable
          COGNITO_USER_POOL_ID:
            Fn::ImportValue:
              Fn::Sub: AI4NG-${Environment}-ParticipantUserPoolId
      Tags:
        Project: AI4NG
        Environment: !Ref Environment
  QuestionnairesApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ai4ng-${Environment}-questionnaires-api
      Role: !GetAtt QuestionnairesApiRole.Arn
      Handler: AI4NGQuestionnairesLambda::AI4NGQuestionnairesLambda.LambdaEntryPoint::FunctionHandlerAsync
      Runtime: dotnet8
      CodeUri: ../src/AI4NGQuestionnairesLambda
      Timeout: 30
      MemorySize: 512
      Tracing: Active
      LoggingConfig:
        LogFormat: JSON
        ApplicationLogLevel: INFO
        SystemLogLevel: INFO
        LogGroup: !Ref QuestionnairesApiLogGroup
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: NetworkStack-PrivateSG
        SubnetIds: !Split
          - ","
          - Fn::ImportValue: NetworkStack-PrivateSubnetIds
      Environment:
        Variables:
          Environment: !Ref Environment
          QUESTIONNAIRES_TABLE: !Ref AI4NGQuestionnairesTable
      Tags:
        Project: AI4NG
        Environment: !Ref Environment

  # API Gateway Integrations (using existing shared API)
  ExperimentsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ExperimentsApi.Arn
      PayloadFormatVersion: "2.0"
      IntegrationMethod: POST

  QuestionnairesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt QuestionnairesApi.Arn
      PayloadFormatVersion: "2.0"
      IntegrationMethod: POST

  ## Routes:
  # Experiments
  GetExperimentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      RouteKey: GET /api/experiments
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-ParticipantAuthorizerId
      Target: !Sub integrations/${ExperimentsIntegration}

  GetExperimentByIdRoute:
