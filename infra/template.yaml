    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      RouteKey: POST /api/questionnaires/by-ids
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-ParticipantAuthorizerId
      Target: !Sub integrations/${QuestionnairesIntegration}

