  UpdateQuestionnaireRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: AI4NG-${Environment}-SharedHttpApiId
      RouteKey: PUT /api/questionnaires/{id}
